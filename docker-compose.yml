services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: finance_news
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d finance_news"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    image: finance_news:latest
    user: "1000:1000"
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/finance_news
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      WORKERS: ${WORKERS:-4}
      JUDGE_NAME: ${JUDGE_NAME:-}
      TZ: America/Sao_Paulo
      HF_HOME: /hf_cache
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - .:/app
      - hf_cache:/hf_cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Run the API. `make ingest` etc still work via `docker compose exec`.
    command:
      - uvicorn
      - finance_news.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  cron:
    image: finance_news:latest
    user: "1000:1000"
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/finance_news
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      WORKERS: ${WORKERS:-4}
      TZ: America/Sao_Paulo
      HF_HOME: /hf_cache
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - .:/app
      - hf_cache:/hf_cache
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    command: ["python", "scripts/cron_loop.py"]

volumes:
  pgdata:
  hf_cache:
